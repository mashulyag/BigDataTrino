name: bdtrino

services:
  postgres:
    image: postgres:15
    container_name: bdtrino_pg
    environment:
      POSTGRES_USER: bds
      POSTGRES_PASSWORD: bds
      POSTGRES_DB: bdtrino
    ports:
      - "5435:5432"
    volumes:
      - ./data:/data/csv:ro
      - ./postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bds -d bdtrino"]
      interval: 5s
      timeout: 5s
      retries: 12

  clickhouse:
    # 24.x стабильно сочетается с Trino 453 (JDBC); при необходимости можно поднять до 25.3+.
    image: clickhouse/clickhouse-server:24.8
    container_name: bdtrino_ch
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: bdtrino_ch
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ./clickhouse/manual:/etc/manual:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password bdtrino_ch -q 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  # Загрузка через native clickhouse-client (порт 9000): HTTP GET с TRUNCATE у части сборок даёт 500.
  ch-loader:
    image: clickhouse/clickhouse-server:24.8
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_PASSWORD: bdtrino_ch
    volumes:
      - ./data:/data:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Truncating bdtrino.mock_data..."
        clickhouse-client \
          --host clickhouse --port 9000 \
          --user default --password "$$CLICKHOUSE_PASSWORD" \
          -q "TRUNCATE TABLE IF EXISTS bdtrino.mock_data"
        for f in "MOCK_DATA.csv" "MOCK_DATA (1).csv" "MOCK_DATA (2).csv" "MOCK_DATA (3).csv" "MOCK_DATA (4).csv"; do
          echo "Loading $$f..."
          clickhouse-client \
            --host clickhouse --port 9000 \
            --user default --password "$$CLICKHOUSE_PASSWORD" \
            --database bdtrino \
            --query="INSERT INTO mock_data FORMAT CSVWithNames" < "/data/$$f"
        done
        echo "ClickHouse mock_data rows:"
        clickhouse-client \
          --host clickhouse --port 9000 \
          --user default --password "$$CLICKHOUSE_PASSWORD" \
          -q "SELECT count() FROM bdtrino.mock_data"

  trino:
    image: trinodb/trino:453
    container_name: bdtrino_trino
    hostname: trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
      - ./trino/scripts:/etc/trino/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      ch-loader:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 40s

networks:
  default:
    name: bdtrino_net
